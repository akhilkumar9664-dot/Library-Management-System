# Application configuration for Library Management System

# ── MongoDB (Local) ──────────────────────────────────────────────────────────
# MongoDB is already running on your machine at port 27017
spring.data.mongodb.uri=mongodb://localhost:27017/library_db
spring.data.mongodb.database=library_db

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ── JWT ──────────────────────────────────────────────────────────────────────
# Secret key used to sign JWT tokens (keep this secret in production!)
jwt.secret=yourSuperSecretKeyForLibraryManagementSystem2024
# Token expiration in milliseconds (86400000 ms = 24 hours)
jwt.expiration=86400000

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.library=DEBUG
logging.level.org.springframework.security=INFO
